<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#70c5ce">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div id="game-wrap">
        <canvas id="game"></canvas>
        <div id="score">0</div>

        <div id="overlay" class="screen">
            <h1>Flappy Bird</h1>
            <p>Tap anywhere to flap.<br>Avoid the pipes!<br>Grab the jetpack for a coin run!</p>
            <button id="start-btn">Start</button>
            <p class="hint">Best: <span id="best-start">0</span></p>
        </div>

        <div id="gameover" class="screen hidden">
            <h1>Game Over</h1>
            <p>Score: <span id="final-score">0</span></p>
            <p>Best: <span id="best-score">0</span></p>
            <button id="restart-btn">Play again</button>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
